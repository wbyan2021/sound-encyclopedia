name: Validate PR
on:
  pull_request:
    paths:
      - 'data/sounds/**'
      - 'data/categories.json'
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/validate.js
